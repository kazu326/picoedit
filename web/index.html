<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>picoedit</title>
    <script>
      if (window.location.protocol === "file:") {
        window.location.replace("http://127.0.0.1:8765/");
      }
    </script>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <h1>picoedit</h1>
          <p id="projectStatus">読み込み中</p>
        </div>
        <div class="toolbar">
          <button id="reloadButton" type="button" title="再読込">再読込</button>
          <button id="timelineRenderButton" class="primary" type="button" title="timeline_with_captions.json と音声実時間を基準に生成">音声タイムライン生成</button>
          <button id="exportFolderButton" type="button" title="書き出し先フォルダ選択">書き出し先</button>
          <button id="exportButton" type="button" title="編集済み分割素材を書き出し" disabled>書き出し</button>
        </div>
      </header>

      <main class="workspace">
        <section class="panel preview-panel">
          <div class="panel-head">
            <h2>プレビュー</h2>
            <div class="panel-head-actions">
              <span id="outputMeta">-</span>
              <a id="singleVideoButton" class="button-link compact" href="/media/output/rough_cut.mp4" download="rough_cut.mp4" aria-disabled="true">1本動画を保存</a>
            </div>
          </div>
          <div class="preview-frame">
            <video id="previewVideo" controls playsinline preload="metadata"></video>
            <div id="emptyPreview" class="empty-preview">output/rough_cut.mp4</div>
          </div>
        </section>

        <section class="panel voice-panel">
          <div class="panel-head">
            <h2>音声生成</h2>
            <span id="voiceStatus">確認中</span>
          </div>
          <div class="voice-body">
            <textarea id="voiceText" rows="5" placeholder="音声にする文章を入力"></textarea>
            <div class="voice-actions">
              <button id="voiceGenerateButton" type="button">音声生成</button>
              <button id="mergeTimestampsButton" type="button">timestamps結合</button>
              <span id="voiceMeta">-</span>
            </div>
            <audio id="voiceAudio" controls hidden></audio>
          </div>
        </section>

        <section class="panel timeline-panel">
          <div class="panel-head">
            <h2>タイムライン</h2>
            <span id="timelineMeta">-</span>
          </div>
          <div id="timelineRows" class="timeline-rows"></div>
        </section>

        <section class="panel assets-panel">
          <div class="panel-head">
            <h2>素材</h2>
            <span id="assetMeta">-</span>
          </div>
          <div id="assetFolders" class="asset-folders"></div>
        </section>

        <section class="panel packs-panel">
          <div class="panel-head">
            <h2>素材パック</h2>
            <span id="packMeta">読み込み中</span>
          </div>
          <div id="packList" class="pack-list"></div>
        </section>

        <section class="panel log-panel">
          <div class="panel-head">
            <h2>ログ</h2>
            <button id="clearLogButton" type="button" title="ログを消去">消去</button>
          </div>
          <pre id="logOutput"></pre>
        </section>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
